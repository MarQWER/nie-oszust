<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <h1>Forografia artystyczna</h1>
    </header>
    <section id="images">
      <img src="1.jpg" alt="obrazy do sprzedaży" title="1.jpg" />
      <img src="2.jpg" alt="obrazy do sprzedaży" title="2.jpg" />
      <img src="3.jpg" alt="obrazy do sprzedaży" title="3.jpg" />
      <img src="4.jpg" alt="obrazy do sprzedaży" title="4.jpg" />
      <img src="5.jpg" alt="obrazy do sprzedaży" title="5.jpg" />
      <img src="6.jpg" alt="obrazy do sprzedaży" title="6.jpg" />
      <img src="7.jpg" alt="obrazy do sprzedaży" title="7.jpg" />
      <img src="8.jpg" alt="obrazy do sprzedaży" title="8.jpg" />
      <img src="9.jpg" alt="obrazy do sprzedaży" title="9.jpg" />
      <img src="10.jpg" alt="obrazy do sprzedaży" title="10.jpg" />
    </section>
    <main>
      <section id="lewy">
        <h3>Zamówienie</h3>
        <label for="obraz">Wybierz obraz:</label>
        <input type="file" name="obraz" id="obraz" accept="image/jpeg" /> <br />
        <label for="kopie">Liczba kopii:</label>
        <input type="number" name="kopie" id="kopie" min="1" /><br />
        <label>
          <input type="radio" name="papier" value="blyszczacy" checked="" />
          Papier błyszczący
        </label>
        <br />
        <label>
          <input type="radio" name="papier" value="matowy" />
          Papier matowy </label
        ><br />
        <button type="button" id="dodajdokosza">Dodaj do koszyka</button>
      </section>
      <nav>
        <ul>
          <li><a href="regulamin.html">Regulamin</a></li>
          <li><a href="uslugi.html">Usługi</a></li>
          <li><a href="https://pixabay.com">Zdjęcia</a></li>
        </ul>
      </nav>
      <section id="prawy">
        <h3>Koszyk</h3>
        <div class="skrypt"></div>
      </section>
      <footer>
        <p>Autor strony: <i>00000000000</i></p>
      </footer>

      <script>
        const cenazakopie = {
          blyszczacy: 1.5,
          matowy: 2,
        };

        const guzik = document.querySelector("#dodajdokosza");

        function dodaj() {
          const plik = document.querySelector("#obraz");
          const wybrany = plik.files[0];
          if (!wybrany) {
            alert("wybierz plik z listy obrazów.");
            return;
          }

          const kopieinput = document.querySelector("#kopie");
          const kopie = Number(kopieinput.value);
          if (!kopie || kopie < 1) {
            alert("Podaj liczbe kopii (minimum 1).");
            kopieinput.focus();
            return;
          }

          const wybranypapier = document.querySelector(
            "input[name='papier']:checked",
          );
          const typpapieru = wybranypapier ? wybranypapier.value : "blyszczacy";
          const cenajedno = cenazakopie[typpapieru] ?? cenazakopie.blyszczacy;
          const cenalaczna = kopie * cenajedno;

          const koszyk = document.querySelector("#prawy .skrypt");
          const pozycja = document.createElement("article");
          pozycja.className = "pozycja";

          const obrazek = document.createElement("img");
          const link = URL.createObjectURL(wybrany);
          obrazek.src = link;
          obrazek.alt = wybrany.name;
          obrazek.onload = () => URL.revokeObjectURL(link);

          const kopieinfo = document.createElement("p");
          kopieinfo.textContent = `Liczba kopii: ${kopie}`;

          const cenainfo = document.createElement("p");
          cenainfo.textContent = `Cena: ${cenalaczna}`;

          pozycja.appendChild(obrazek);
          pozycja.appendChild(kopieinfo);
          pozycja.appendChild(cenainfo);
          koszyk.appendChild(pozycja);
        }

        guzik.addEventListener("click", dodaj);
      </script>
    </main>
  </body>
</html>
